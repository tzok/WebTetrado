[program:ws-worker]
directory=/opt/webtetrado
command=uvicorn WebTetrado.asgi:application --reload --host 0.0.0.0 --port 8081
autostart=true
autorestart=true
user=root
numprocs=1
startretries=50
stopsignal=INT
killasgroup=true
stopasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
